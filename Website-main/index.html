<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="indexStylesheet.css">
    <script src="index.js" defer></script>
    <title>Pothole Dashboard</title>
</head>

<body>

    
    <nav>
        <div class="imageContainer">
            <img src="assets/Images/UserInterfaceLogo.png" alt="logo">
        </div>

        <div class="navOptions">
            <ul>
                <li><a href="#" onclick="showScreen('reportsTab')">Reports</a></li>
                <li><a href="#" onclick="showScreen('settingsTab')">Settings</a></li>
                <!-- <button onclick="showScreen('teamTab')">Team</button> -->
                 <li><a href="#" onclick="showScreen('teamTab')">Team</a></li>

                <li id="loginLogoutLi"><a href="login.html">Login</a></li>

            </ul>
        </div>
    </nav>


 
    <div class="heroContainer">

        
        <div class="menuContainer">

            <div class="menuButton">
                <button onclick="showScreen('planTab')">Plan Next Route</button>
            </div>

            <div class="menuButton">
                <button onclick="showScreen('aboutTab')">About Road</button>
            </div>

            <div class="menuButton">
                <button onclick="showScreen('costTab')">Estimate Cost</button>
            </div>

            <div class="menuButton">
                <button onclick="showScreen('decayTab')">Decay</button>
            </div>

            <div class="menuButton">
                <button onclick="showScreen('numberTab')">Number</button>
            </div>

            <div class="menuButton">
                <button onclick="showScreen('summaryTab')">Road Summary</button>
            </div>

        </div>


        
        <div class="menuDisplay">

            <div id="teamTab" class="tabPanel" hidden>
        <h2>Our Team</h2>
        <div id="teamCards" class="teamContainer"></div>
            </div>


    <div id="planTab" class="tabPanel">
        <h2>Plan Next Route</h2>

        <div class="searchBar">
            <label for="roadSearch" class="sr-only">Search for a road</label>
            <input type="text" id="roadSearch" placeholder="Please enter a road name...">
            <button onclick="handleSearch()">Search</button>
        </div>

        <div id="status" role="status" aria-live="polite"></div>

        <div class="resultsContainer">
            <div id="densityOutput" class="resultCard"></div>
            <div id="avgDistanceOutput" class="resultCard"></div>
            <div id="depthPercentOutput" class="resultCard"></div>
            <div id="costDecisionOutput" class="resultCard"></div>
            <div id="decayOutput" class="resultCard"></div>
            <div id="reportOutput" class="resultCard"></div>
        </div>
    </div>

    <div id="aboutTab" class="tabPanel" hidden>
        <h2>About Road</h2>
        <div id="aboutRoadContent" class="resultsContainer"></div>
    </div>

    <div id="costTab" class="tabPanel" hidden>
        <h2>Estimate Cost</h2>
        <div id="costTabContent" class="resultsContainer"></div>
    </div>

    <div id="decayTab" class="tabPanel" hidden>
        <h2>Decay Analysis</h2>
        <div id="decayTabContent" class="resultsContainer"></div>
    </div>

    <div id="numberTab" class="tabPanel" hidden>
        <h2>Pothole Numbers</h2>
        <div id="numberTabContent" class="resultsContainer">
            
        </div>
    </div>

    <div id="summaryTab" class="tabPanel" hidden>
        <h2>Road Summary</h2>
        <div id="summaryTabContent" class="resultsContainer"></div>
    </div>

    <div id="reportsTab" class="tabPanel" hidden>
        <h2>All Road Reports</h2>
        <div id="reportsTabContent" class="resultsContainer">

        </div>


    </div>
    <div id="settingsTab" class="tabPanel" hidden>
    <h2>Settings</h2>

    <div class="resultsContainer">

        
        <div class="resultCard">
            <h3>Theme Mode</h3>
            <label><input type="radio" name="theme" value="light" onclick="setTheme('light')"> Light</label><br>
            <label><input type="radio" name="theme" value="dark" onclick="setTheme('dark')"> Dark</label><br>
            <label><input type="radio" name="theme" value="contrast" onclick="setTheme('contrast')"> High Contrast</label>
        </div>

        
        <div class="resultCard">
            <h3>Unit Preferences</h3>
            <label>Distance:
                <select id="unitDistance" onchange="updateUnits()">
                    <option value="km">Kilometers</option>
                    <option value="miles">Miles</option>
                </select>
            </label><br><br>

            <label>Currency:
                <select id="unitCurrency" onchange="updateUnits()">
                    <option value="USD">USD</option>
                    <option value="BBD">BBD</option>
                    <option value="CAD">CAD</option>
                </select>
            </label>
        </div>

        
        <div class="resultCard">
            <h3>Alert Thresholds</h3>
            <label>Max Density (potholes/km):
                <input type="number" id="densityThreshold" value="5" onchange="updateAlerts()">
            </label><br><br>

            <label>Deep Pothole % Warning:
                <input type="number" id="deepThreshold" value="50" onchange="updateAlerts()">%
            </label><br><br>

            <label>Cost Difference Alert ($):
                <input type="number" id="costThreshold" value="5000" onchange="updateAlerts()">
            </label>
        </div>

        
        <div class="resultCard">
            <h3>Simulation Controls</h3>
            <label>Weekly Growth Rate:
                <input type="range" id="growthRate" min="0" max="5" value="1" oninput="updateSimulation()">
            </label>
            <p id="growthRateLabel">Growth Rate: 1 pothole/week</p>
        </div>

       
        <div class="resultCard">
            <h3>Reset Dashboard</h3>
            <button onclick="resetDashboard()">Reset All Data</button>
        </div>

    </div>
</div>
    </div>

    </div>

</body>
</html>
