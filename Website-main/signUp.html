<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginStylesheet.css">
    <script src="signUp.js" defer></script>
    <title>Sign Up</title>
</head>
<body>
    <nav>
        <div class="imageContainer">
            <img src="assets/Images/UserInterfaceLogo.png" alt="logo">
        </div>
        <div class="navOptions">
            <ul>
                <li><a href="#">Reports</a></li>
                <li><a href="#">Settings</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="loginContainer">
        <form id="signupForm">
            <h2>Sign Up</h2>
            <input id="newUsername" type="text" placeholder="Username" required>
            <input id="newPassword" type="password" placeholder="Password" required>
            <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
            <button type="submit">Create Account</button>
            <p id="signupStatus"></p>
            <p class="smallText">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>
</body>
</html>
